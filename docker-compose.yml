services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: linktree
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:3
    environment:
      - SERVICES=s3
      - AWS_DEFAULT_REGION=us-east-1
      - S3_BUCKET=avatars
    ports:
      - "4566:4566"
    volumes:
      - ./localstack/init/ready.d:/etc/localstack/init/ready.d

  kafka:
    image: confluentinc/confluent-local:7.7.0
    ports:
      - "9092:9092"
    environment:
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:29093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      ENVIRONMENT: development
      DATABASE_URL: postgres://admin:admin123@db:5432/linktree
      JWT_ACCESS_SECRET: dev_jwt_secret_change_me
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      # - /app/node_modules
      # - /app/apps/api/node_modules
    depends_on:
      - db
      - localstack

volumes:
  db_data:
